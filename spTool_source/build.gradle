tasks.withType(JavaCompile) {
    options.encoding = "UTF-8"
}


/*
 * Set the basic Java runtime parameters (heap size etc.)
 */
application {
    mainClass.set("MainLauncher"); // relative to src/main/java/ //"org.me.nano.MainLauncher"
    applicationName = "spTool3"
    executableDir = ""
    applicationDefaultJvmArgs = ["-showversion",
                                 "-XX:MaxHeapFreeRatio=100",
                                 "-XX:InitialRAMPercentage=30",
                                 "-XX:MinRAMPercentage=20", //80
                                 "-XX:MaxRAMPercentage=90", //80 but trying 65 b/c the system freezes badly if sptool2 and e.g. excel are also open for processing
                                 //"-Dprism.maxvram=2G", // v91 b/c  error message
                                 "-Dprism.maxvram=2G",
                                 "-Djava.library.path=lib",
                                 "-enableassertions",
                                 // "-Dprism.order=sw", // Disable hardware acceleration may help with JFree bugs at high load--bug was due to multithreading in visualizer
                                 "-Dapple.awt.application.name=spTool3 ${version}",
                                 // "-XX:+UnlockExperimentalVMOptions", // v39 recommended by SH
                                 // "-XX:+UseZGC", // v39 recommended by SH
                                 // "-XX:+UseParallelGC", // new and quite good else XX:+UseG1GC
                                 "-XX:+UseG1GC", // chatgpt says is better at releasing memory
                                 "-XX:G1PeriodicGCInterval=5000",
                                 "-XX:+ExplicitGCInvokesConcurrent" // NO SPACES BEFORE -XX !!!
    ]
}

/*
 * Build the JVM runtime using jlink
 */
runtime {
    options = ["--compress=2", "--vm=server", "--no-header-files", "--no-man-pages", "--output", "jre/jre"]
    modules = ["java.desktop",
               "java.logging",
               "java.net.http",
               "java.rmi",
               "java.sql",
               "java.datatransfer",
               "java.management",
               "java.xml",
               "java.xml.crypto",
               "jdk.xml.dom",
               "java.naming",
               "java.transaction.xa",
               "java.scripting",
               "java.compiler",
               "jdk.jsobject",
               "jdk.jfr",
               "java.security.sasl",
               "java.security.jgss",
               "jdk.unsupported",
               "jdk.unsupported.desktop"]

    imageDir = file("${buildDir}/${applicationName}-${version}-${osSuffix}")
    imageZip = file(relativePath(imageDir) + ".zip")
}

/*
 * Provide a default start script for this platform
 */
startScripts {
    applicationName = "startspTool3-" + osSuffix
    classpath = files("lib/*")
    doLast {
        if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
            delete unixScript
            // Temporary fix for https://github.com/gradle/gradle/issues/10387
            windowsScript.text = windowsScript.text.replace('set JAVA_HOME=\"%~dp0.."', 'set JAVA_HOME="%~dp0"')
        } else {
            delete windowsScript
        }
    }
}

/*
 * Copy the resources and logging properties
 */
tasks.runtime.doLast {


}

/*
 * This is important in order to copy all .java, .fxml, and help files into the final MZmine jar.
 * The .java files are only for people who want to check the source codes.
 * But the .fxml and help files are required for the GUI.
 */
jar {
    sourceSets.main.resources.srcDirs += ["src/main/java"]
}