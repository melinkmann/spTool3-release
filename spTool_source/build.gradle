plugins {
    id "java"
    id "application"
    id "org.openjfx.javafxplugin" version "0.0.13"
    //    id 'org.openjfx.javafxplugin' version '0.0.10' // tested Feb2022
    /*
    Returned
    > Configure project :
        Project : => no module-info.java found
        OS detected as Windows

     */
    id "org.beryx.runtime" version "1.9.0" // "1.8.0"
}

sourceCompatibility = "17"
targetCompatibility = "17"
/*
used to run with 12
 */


defaultTasks "runtimeZip"

// Check the OS
project.ext.osSuffix = org.gradle.internal.os.OperatingSystem.current().getName().replaceAll(" ", "_")
if (org.gradle.internal.os.OperatingSystem.current().isMacOsX())
    project.ext.osSuffix = "macOS"
if (org.gradle.internal.os.OperatingSystem.current().isLinux())
    project.ext.osSuffix = "Linux"
if (org.gradle.internal.os.OperatingSystem.current().isWindows())
    project.ext.osSuffix = "Windows"
println "OS detected as " + project.ext.osSuffix


group 'org.me'
version = 'v'

repositories {
    mavenCentral()
}


ext {
    guavaVersion = "29.0-jre"
    // controlsfxVersion = "11.0.1"
    opencsvVersion = "5.1"
}


