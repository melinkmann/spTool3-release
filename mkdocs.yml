site_name: spTool documentation

docs_dir: docs

nav:
  - Home: index.md
  - Installation: installation.md
  - Overview: usage.md
  - Methods: methods.md

#theme:
#  name: readthedocs
#  navigation_depth: 4
#  collapse_navigation: false

theme:
  name: material
  features:
    - navigation.expand
    - search.suggest      # autocomplete-style suggestions as you type
    - search.highlight    # highlights matched terms on the result page

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details      # enables collapsible ??? blocks (optional but handy)
  - pymdownx.superfences  # improves code block handling, commonly paired with admonition

extra_css:
  - extra.css